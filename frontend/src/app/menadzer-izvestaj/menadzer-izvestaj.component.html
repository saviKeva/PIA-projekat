<div class="container mt-5">
  <div class="card shadow-sm border-0">
    <div class="card-body text-center p-5">
      <div class="mb-4">
        <i class="bi bi-file-earmark-bar-graph text-success" style="font-size: 4rem;"></i>
      </div>
      <h2 class="card-title">Mesečni izveštaj o popunjenosti</h2>
      <p class="text-muted">
        Generišite zbirni PDF izveštaj za tekući mesec (<b>{{ trenutniMesecNaziv }}</b>)
        za sve prostore kojima upravljate.
      </p>
      <hr class="my-4">

      <div *ngIf="ucitavanje" class="text-center mb-3">
        <div class="spinner-border text-success" role="status"></div>
        <p>Učitavanje podataka...</p>
      </div>

      <button (click)="generisiZbirniPDF()" class="btn btn-success btn-lg px-5" *ngIf="!ucitavanje">
        <i class="bi bi-file-earmark-pdf-fill me-2"></i> Generiši PDF Izveštaj
      </button>
    </div>
  </div>
</div>
